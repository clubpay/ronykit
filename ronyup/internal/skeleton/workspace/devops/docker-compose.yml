services:
  postgres:
    image: postgres:16-alpine
    container_name: masoud-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user-db
      POSTGRES_USER: dbUser
      POSTGRES_PASSWORD: dbPass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbUser -d user-db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
