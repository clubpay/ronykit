apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle
  namespace: devbox
  labels:
    app: tigerbeetle
spec:
  clusterIP: None
  selector:
    app: tigerbeetle
  ports:
    - name: tb
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tigerbeetle
  namespace: devbox
  labels:
    app: tigerbeetle
spec:
  serviceName: tigerbeetle
  replicas: 1
  selector:
    matchLabels:
      app: tigerbeetle
  template:
    metadata:
      labels:
        app: tigerbeetle
    spec:
      initContainers:
        - name: format
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.29
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -f /data/0_0.tigerbeetle ]; then
                /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
              fi
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: tigerbeetle
          image: ghcr.io/tigerbeetle/tigerbeetle:0.16.29
          args:
            - start
            - --addresses=0.0.0.0:3000
            - /data/0_0.tigerbeetle
          ports:
            - containerPort: 3000
              name: tb
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
