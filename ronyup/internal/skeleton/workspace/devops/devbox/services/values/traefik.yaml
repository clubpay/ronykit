# Traefik ingress controller for the devbox VM (installed by scripts/provision.sh
# into the `traefik` namespace). Replaces the microk8s nginx ingress addon.
#
# Single-node dev VM: expose each entrypoint with hostPort so traffic lands on
# the VM IP (e.g. db.<app>.localdev:5432) without a Service / LoadBalancer.
#
# IMPORTANT: the TCP `ports` below must stay in sync with the tcp endpoints in
# services/exposure.yaml — apply-exposure.sh creates one IngressRouteTCP per tcp
# endpoint and references the entrypoint by the endpoint id (name == id, same
# port). Add a tcp endpoint there → add a matching port here → re-provision.

deployment:
  kind: Deployment
  replicas: 1

# With hostPort, only one Traefik pod can bind the VM ports at a time. Avoid
# rolling updates that start a replacement pod before the old one releases them.
updateStrategy:
  type: Recreate

# Bind entrypoints on the VM IP with hostPort instead of a cluster Service.
hostNetwork: false
service:
  enabled: false

# Traefik listens on unprivileged container ports. Kubernetes hostPort maps the
# public VM ports to the pod, so the container can stay non-root.
securityContext:
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Register the `traefik` IngressClass and make it the cluster default so plain
# Ingress objects (HTTP endpoints) route through Traefik.
ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesIngress:
    enabled: true
  kubernetesCRD:
    enabled: true          # IngressRouteTCP (raw TCP passthrough)

# HTTP(S) plus one dedicated TCP entrypoint per devbox tcp service. Names must
# match the tcp endpoint ids in exposure.yaml. For web/websecure, Traefik listens
# on high container ports and Kubernetes exposes the standard host ports.
ports:
  web:
    port: 8000
    hostPort: 80
    protocol: TCP
  websecure:
    port: 8443
    hostPort: 443
    protocol: TCP
  postgres:
    port: 5432
    hostPort: 5432
    protocol: TCP
  redis:
    port: 6379
    hostPort: 6379
    protocol: TCP
  temporal:
    port: 7233
    hostPort: 7233
    protocol: TCP
  otel:
    port: 4317
    hostPort: 4317
    protocol: TCP
  redpanda:
    port: 9092
    hostPort: 9092
    protocol: TCP
  tigerbeetle:
    port: 3000
    hostPort: 3000
    protocol: TCP
  rustfs:
    port: 9000
    hostPort: 9000
    protocol: TCP
