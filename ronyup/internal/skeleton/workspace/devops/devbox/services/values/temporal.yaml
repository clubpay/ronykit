# Temporal server + UI. Persistence uses the devbox PostgreSQL release (see values/postgres.yaml).
# Requires services.postgres=true in config.yaml.
server:
  replicaCount: 1
  config:
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 4
      datastores:
        default:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal
            connectAddr: "postgres-postgresql.devbox.svc.cluster.local:5432"
            connectProtocol: tcp
            user: dbUser
            password: dbPass
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"
        visibility:
          sql:
            createDatabase: true
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal_visibility
            connectAddr: "postgres-postgresql.devbox.svc.cluster.local:5432"
            connectProtocol: tcp
            user: dbUser
            password: dbPass
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"

schema:
  useHelmHooks: true

web:
  enabled: true
  ingress:
    enabled: false
