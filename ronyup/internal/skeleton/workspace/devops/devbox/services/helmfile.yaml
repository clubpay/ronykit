repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: temporalio
    url: https://go.temporal.io/helm-charts
  - name: redpanda
    url: https://charts.redpanda.com
  - name: open-telemetry
    url: https://open-telemetry.github.io/opentelemetry-helm-charts
  - name: jaegertracing
    url: https://jaegertracing.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts

environments:
  default:
    values:
      - ../config.yaml

---

releases:
  - name: postgres
    namespace: devbox
    chart: bitnami/postgresql
    installed: {{ .Values.services.postgres | default false }}
    values:
      - values/postgres.yaml

  - name: redis
    namespace: devbox
    chart: bitnami/redis
    installed: {{ .Values.services.redis | default false }}
    values:
      - values/redis.yaml

  - name: temporal
    namespace: devbox
    chart: temporalio/temporal
    installed: {{ .Values.services.temporal | default false }}
    values:
      - values/temporal.yaml

  - name: redpanda
    namespace: devbox
    chart: redpanda/redpanda
    installed: {{ .Values.services.redpanda | default false }}
    values:
      - values/redpanda.yaml

  - name: otel-collector
    namespace: devbox
    chart: open-telemetry/opentelemetry-collector
    installed: {{ .Values.services.observability | default false }}
    values:
      - values/otel-collector.yaml

  - name: jaeger
    namespace: devbox
    chart: jaegertracing/jaeger
    installed: {{ .Values.services.observability | default false }}
    values:
      - values/jaeger.yaml

  - name: grafana
    namespace: devbox
    chart: grafana/grafana
    installed: {{ .Values.services.observability | default false }}
    values:
      - values/grafana.yaml
