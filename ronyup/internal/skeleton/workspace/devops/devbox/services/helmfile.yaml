# Devbox Helm releases. Which releases are applied is controlled by config.yaml
# via scripts/helmfile-apply.sh (do not add {{ }} templates here — Helmfile v1
# requires .gotmpl for that and is brittle across versions).
repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: temporalio
    url: https://go.temporal.io/helm-charts
  - name: redpanda
    url: https://charts.redpanda.com
  - name: open-telemetry
    url: https://open-telemetry.github.io/opentelemetry-helm-charts
  - name: jaegertracing
    url: https://jaegertracing.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:
  - name: postgres
    namespace: devbox
    chart: bitnami/postgresql
    labels:
      devbox-service: postgres
    values:
      - values/postgres.yaml

  - name: redis
    namespace: devbox
    chart: bitnami/redis
    labels:
      devbox-service: redis
    values:
      - values/redis.yaml

  - name: temporal
    namespace: devbox
    chart: temporalio/temporal
    labels:
      devbox-service: temporal
    values:
      - values/temporal.yaml

  - name: redpanda
    namespace: devbox
    chart: redpanda/redpanda
    labels:
      devbox-service: redpanda
    values:
      - values/redpanda.yaml

  - name: otel-collector
    namespace: devbox
    chart: open-telemetry/opentelemetry-collector
    labels:
      devbox-service: observability
    values:
      - values/otel-collector.yaml

  - name: jaeger
    namespace: devbox
    chart: jaegertracing/jaeger
    labels:
      devbox-service: observability
    values:
      - values/jaeger.yaml

  - name: grafana
    namespace: devbox
    chart: grafana/grafana
    labels:
      devbox-service: observability
    values:
      - values/grafana.yaml
