name: Bump Homebrew formula

# Re-run the Homebrew tap update for an existing ronyup GitHub release (no rebuild).
# Normal releases use the "RonyUP Release" workflow, which builds binaries and
# updates the tap in one pass.
#
# Requires repository secret HOMEBREW_TAP_TOKEN: a PAT (or fine-grained token)
# with `contents:write` on clubpay/homebrew-tap.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "ronyup tag to publish (e.g. ronyup/v0.4.7)"
        required: true

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag and version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG##*/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG_ENC="$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "$TAG")"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG_ENC}"
          CHECKSUMS_FILE="${RUNNER_TEMP}/checksums.env"
          : > "$CHECKSUMS_FILE"
          for platform in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            upper="$(echo "$platform" | tr '[:lower:]' '[:upper:]' | tr '-' '_')"
            key="SHA256_${upper}"
            file="ronyup_${VERSION}_${platform}.tar.gz"
            curl -fsSL "${BASE_URL}/${file}" -o "$file"
            sha="$(sha256sum "$file" | cut -d' ' -f1)"
            echo "${key}=${sha}" >> "$CHECKSUMS_FILE"
            echo "${key}=${sha}"
          done

      - name: Render formula
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          bash ./scripts/render-homebrew-formula.sh \
            --tag "$TAG" \
            --repo "${{ github.repository }}" \
            --checksums "${RUNNER_TEMP}/checksums.env" \
            --output "${RUNNER_TEMP}/ronyup.rb"
          echo "----- rendered formula -----"
          cat "${RUNNER_TEMP}/ronyup.rb"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: clubpay/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          cp "${RUNNER_TEMP}/ronyup.rb" tap/Formula/ronyup.rb

      - name: Commit and push
        run: |
          cd tap
          if git diff --quiet; then
            echo "Formula already up to date; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ronyup.rb
          git commit -m "ronyup ${{ steps.meta.outputs.version }}"
          git push
